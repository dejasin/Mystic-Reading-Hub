kind = "web"
previewPath = "/oracle-website/"
title = "The Oracle — Marketing & Compliance Website"
version = "1.0.0"
id = "artifacts/oracle-website"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/oracle-website/" ]
localPort = 21258

[services.development]
run = "pnpm --filter @workspace/oracle-website run dev"

[services.production]
publicDir = "artifacts/oracle-website/public"
serve = "static"

[services.env]
PORT = "21258"
BASE_PATH = "/oracle-website/"
