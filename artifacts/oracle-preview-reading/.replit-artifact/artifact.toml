kind = "video"
previewPath = "/oracle-preview-reading/"
title = "App Store Preview 2 — The Reading Reveal"
version = "1.0.0"
id = "artifacts/oracle-preview-reading"
router = "path"

[[integratedSkills]]
name = "video-js"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/oracle-preview-reading/" ]
localPort = 19678

[services.development]
run = "pnpm --filter @workspace/oracle-preview-reading run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/oracle-preview-reading", "run", "build" ]
publicDir = "artifacts/oracle-preview-reading/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19678"
BASE_PATH = "/oracle-preview-reading/"
