kind = "video"
previewPath = "/oracle-preview-ritual/"
title = "App Store Preview 1 — The Ritual"
version = "1.0.0"
id = "artifacts/oracle-preview-ritual"
router = "path"

[[integratedSkills]]
name = "video-js"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/oracle-preview-ritual/" ]
localPort = 23734

[services.development]
run = "pnpm --filter @workspace/oracle-preview-ritual run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/oracle-preview-ritual", "run", "build" ]
publicDir = "artifacts/oracle-preview-ritual/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23734"
BASE_PATH = "/oracle-preview-ritual/"
