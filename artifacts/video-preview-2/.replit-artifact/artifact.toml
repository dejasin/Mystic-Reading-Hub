kind = "video"
previewPath = "/video-preview-2/"
title = "Oracle Preview 2 — Your Reading Awaits"
version = "1.0.0"
id = "artifacts/video-preview-2"
router = "path"

[[integratedSkills]]
name = "video-js"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/video-preview-2/" ]
localPort = 24361

[services.development]
run = "pnpm --filter @workspace/video-preview-2 run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/video-preview-2", "run", "build" ]
publicDir = "artifacts/video-preview-2/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24361"
BASE_PATH = "/video-preview-2/"
